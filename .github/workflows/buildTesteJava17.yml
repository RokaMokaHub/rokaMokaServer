# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Construção e Testes Java 17

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkoput do código 
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    
    - name: Execução de Testes
      run: mvn clean verify
    
    - name: Comentário de sucesso de teste
      if: success()
      uses: actions/github-script@v7
      with:
        script: | github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: "🟢 Testes passaram com sucesso!" })
    
    - name: Comentário de falha de teste
      if: failure()
      uses: actions/github-script@v7
      with:
        script: | github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: "🔴 Testes falharam. Corrige antes de fazer merge." })
    
    - name: Build
      run: mvn clean compile
    - name: Comentário de sucesso de build
      if: success()
      uses: actions/github-script@v7
      with:
        script: | github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: "🟢 Build obteve sucesso!" })
    
    - name: Comentário de falha de teste
      if: failure()
      uses: actions/github-script@v7
      with:
        script: | github.rest.issues.createComment({ issue_number: context.issue.number, owner: context.repo.owner, repo: context.repo.repo, body: "🔴 Build falharam. Corrige antes de fazer merge." })
          
